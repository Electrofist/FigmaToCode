<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reference Frame</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --surface-white: rgba(255,255,255,1);
      --text-primary: rgba(26,26,26,1);
      --brand-primary: rgba(26,115,255,1);
      --brand-primary-2: rgba(255,153,51,1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; background: #f4f4f5; padding: 24px; }
    .figma-root img { display: block; max-width: 100%; }
  </style>
</head>
<body>
  <!-- Generated from Figma by FigmaToCode (free/REST path). Frame: Reference Frame.
       Auto-layout frames become flexbox; icons/images are Figma export URLs that expire ~7 days. -->
  <div class="figma-root" style="display:flex;position:relative;flex-direction:column;justify-content:flex-start;align-items:center;gap:16px;padding:24px 0px 0px 24px;width:600px;margin:0 auto;overflow:hidden;background-color:var(--surface-white)">
    <div data-name="Title" style="color:var(--text-primary);font-size:32px;font-family:'Inter',sans-serif;font-weight:700;text-align:center;white-space:pre-wrap">Hello World</div><div data-name="Primary Button" style="flex-shrink:0;display:flex;position:relative;flex-direction:row;justify-content:center;align-items:center;gap:8px;padding:10px 0px 0px 16px;overflow:visible;background-color:var(--brand-primary);border-radius:8px;border:1px solid rgba(0,51,153,1);box-shadow:0px 2px 6px rgba(0,0,0,0.2)"><div data-name="Label" style="width:80px;flex-shrink:0;color:var(--surface-white);font-size:16px;font-family:'Inter',sans-serif;font-weight:600;white-space:pre-wrap">Click me</div></div><div data-name="Hero Photo" style="width:552px;height:300px;flex-shrink:0;position:relative;overflow:visible;background-color:rgba(230,230,230,1);background-image:url('https://s3.example/img1.png');background-size:cover;background-position:center;background-repeat:no-repeat"></div><div data-name="Gradient Bar" style="width:552px;height:12px;flex-shrink:0;position:relative;overflow:visible;background:linear-gradient(90deg,rgba(255,0,0,1) 0%,rgba(0,0,255,1) 100%)"></div><div data-name="Badge" style="position:absolute;right:20px;width:60px;top:20px;height:24px;position:absolute;overflow:visible;background-color:var(--brand-primary-2);border-radius:12px"></div>
  </div>
</body>
</html>
