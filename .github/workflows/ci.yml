name: CI

# Guards every push (ANY branch, so feature branches get CI signal before merge)
# and every PR: syntax, generator behaviour, and release-packaging integrity.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check (main.js)
        run: node --check main.js

      - name: Generator tests
        run: node test/generator.test.js

      - name: Design-token tests
        run: node test/tokens.test.js

      - name: Error-path + crafted-response tests
        run: node test/errors.test.js

      - name: Performance / pathological ceilings
        run: node test/perf.test.js

      - name: Golden-snapshot regression
        run: node test/snapshot.test.js

      - name: Stress + fuzz suite
        run: node test/stress.test.js

      - name: Asset-embedding guard rail
        run: node test/assets.test.js

      - name: Release-manifest integrity
        run: node scripts/check-release-manifest.js
